                identify the values that are relevant in that context. In the

                values that were identified, useful for further reflection and

                and physical world, where their actions have both social and
                physical consequences, posing challenges for researchers when
                designing social robots. This study starts with a scoping review
                to identify potential ethical concerns arising from interactions
                with robotic systems. A focus group of technology ethics experts
                then established a comprehensive list of key topics and values
                in human-robot interaction (HRI) literature. These insights were
                integrated into the HRI Value Compass web tool, to help HRI
                researchers identify ethical values in robot design. The tool
                was evaluated in a pilot study. This work benefits the HRI
                community by highlighting key ethical concerns in human-robot
                interactions and providing an instrument to help researchers
